function EmberField() {
  const embers = useMemo(() => Array.from({ length: 18 }).map((_, i) => ({
    id: i, left: Math.random() * 100, delay: Math.random() * 8,
    duration: 6 + Math.random() * 6, size: 2 + Math.random() * 3,
  })), []);
  return (
    <div className="ember-field" aria-hidden="true">
      {embers.map((e) => (
        <span key={e.id} className="ember" style={{
          left: `${e.left}%`, animationDelay: `${e.delay}s`,
          animationDuration: `${e.duration}s`, width: e.size, height: e.size,
        }} />
      ))}
    </div>
  );
}

function SizeModal({ item, onClose, onAdd }) {
  const [size, setSize] = useState(Object.keys(item.sizes)[0]);
  const [qty, setQty] = useState(1);
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-sheet" onClick={(e) => e.stopPropagation()}>
        <div className="modal-handle" />
        <div className="modal-head">
          <h3>{item.name}</h3>
          <button className="icon-btn" onClick={onClose}><Icon name="x" size={20} /></button>
        </div>
        <div className="size-grid">
          {Object.entries(item.sizes).map(([s, p]) => (
            <button key={s} className={`size-chip ${size === s ? "size-chip-active" : ""}`} onClick={() => setSize(s)}>
              <span>{s}</span>
              <span className="size-chip-price">{fmt(p)}</span>
            </button>
          ))}
        </div>
        <div className="qty-row">
          <span className="qty-label">الكمية</span>
          <div className="qty-control">
            <button className="qty-btn" onClick={() => setQty((q) => Math.max(1, q - 1))}><Icon name="minus" size={16} /></button>
            <span className="qty-num">{qty}</span>
            <button className="qty-btn" onClick={() => setQty((q) => q + 1)}><Icon name="plus" size={16} /></button>
          </div>
        </div>
        <button className="add-btn" onClick={() => { onAdd(item, size, qty); onClose(); }}>
          <span>أضف للسلة</span>
          <span className="add-btn-price">{fmt(item.sizes[size] * qty)}</span>
        </button>
      </div>
    </div>
  );
}

// ---------- طلباتي ----------
function OrdersModal({ orders, onClose }) {
  const [liveStatuses, setLiveStatuses] = useState({});

  useEffect(() => {
    if (orders.length === 0) return;
    
    const listeners = orders.map(o => {
      const statusRef = db.ref(`orders/${o.id}/status`);
      statusRef.on('value', (snapshot) => {
        const currentStatus = snapshot.val();
        if (currentStatus) {
          setLiveStatuses(prev => ({ ...prev, [o.id]: currentStatus }));
        }
      });
      return { ref: statusRef };
    });

    return () => {
      listeners.forEach(l => l.ref.off());
    };
  }, [orders]);

  function renderStatusLabel(status) {
    if (status === 'delivered') return <span style={{ color: '#10b981', fontWeight: 'bold' }}>✅ تم التسليم</span>;
    if (status === 'out') return <span style={{ color: '#ef4444', fontWeight: 'bold' }}>✖ انتهى المخزون</span>;
    return <span style={{ color: '#3b82f6', fontWeight: 'bold' }}>⏳ قيد التحضير بالمطبخ</span>;
  }

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="cart-sheet" onClick={(e) => e.stopPropagation()}>
        <div className="modal-handle" />
        <div className="modal-head">
          <h3>طلباتي المرسلة</h3>
          <button className="icon-btn" onClick={onClose}><Icon name="x" size={20} /></button>
        </div>
        {orders.length === 0 ? (
          <div className="empty-cart">
            <Icon name="receipt" size={40} strokeWidth={1.2} />
            <p>لا توجد طلبات بعد</p>
            <span>ستظهر هنا كل الطلبات التي ترسلها</span>

// ---------- إتمام الطلب ----------
function Checkout({ cart, total, onBack, onClose, onPlaceOrder }) {
  const [mode, setMode] = useState("delivery");
  const [name, setName] = useState("");
  const [address, setAddress] = useState("");
  const [phoneNum, setPhoneNum] = useState("");
  const [notes, setNotes] = useState("");
  const [placed, setPlaced] = useState(false);
  const [lastMessage, setLastMessage] = useState("");

  const canSubmit = name.trim() && phoneNum.trim() && (mode === "pickup" || address.trim());

  function buildMessage() {
    const lines = cart.map((l) => `• ${l.name}${l.size ? " (" + l.size + ")" : ""} × ${l.qty} = ${fmt(l.unitPrice * l.qty)}`);
    const parts = [
      `طلب جديد من تطبيق ${RESTAURANT.name}`,
      `الاسم: ${name}`, `الهاتف: ${phoneNum}`,
      mode === "delivery" ? `التوصيل إلى: ${address}` : `الاستلام من المحل`,
      notes ? `ملاحظات: ${notes}` : null,
      "—", ...lines, "—", `المجموع: ${fmt(total)}`,
    ].filter(Boolean);
    return parts.join("\n");
  }

  function submit() {
    if (!canSubmit) return;
    const message = buildMessage();
    const orderId = `order_${Date.now()}`;
    const order = {
      id: orderId, timestamp: Date.now(), mode, name, phone: phoneNum,
      address: mode === "delivery" ? address : null, notes,
      items: cart.map((l) => ({ name: l.name, size: l.size || "", qty: l.qty, unitPrice: l.unitPrice })),
      total,
      status: 'preparing'
    };
    
    setLastMessage(message);
    
    db.ref(`orders/${orderId}`).set(order)
      .then(() => {
        onPlaceOrder(order);
        setPlaced(true);
      })
      .catch((err) => {
        alert("حدث خطأ أثناء الاتصال بالسيرفر السحابي. يمكنك إرسال الطلب عبر الواتساب مباشرة.");
        console.error(err);
      });
  }

  function whatsappLink() {
    const digits = OWNER_WHATSAPP.replace(/^0/, "212");
    return `https://wa.me/${digits}?text=${encodeURIComponent(lastMessage || buildMessage())}`;
  }

  if (placed) {
    return (
      <div className="modal-overlay">
        <div className="cart-sheet placed-sheet">
          <div className="placed-icon"><Icon name="check" size={32} strokeWidth={2.5} /></div>
          <h3 className="placed-title">تم إرسال طلبك تلقائياً للوحة التحكم أونلاين</h3>
          <p className="placed-sub">يرجى أيضاً تأكيد الطلب وإرساله عبر الواتساب لضمان المتابعة المباشرة مع الإدارة</p>
          <a className="whatsapp-btn" href={whatsappLink()} target="_blank" rel="noopener noreferrer">
            <Icon name="message-circle" size={18} /><span>إرسال عبر واتساب للمطعم</span>
          </a>
          <a className="call-btn" href={`tel:${RESTAURANT.phone}`}><Icon name="phone" size={16} /><span>اتصال مباشر: {RESTAURANT.phone}</span></a>
          <button className="ghost-btn" onClick={onClose}>إغلاق والعودة للمنيو</button>
        </div>
      </div>
    );
  }

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="cart-sheet" onClick={(e) => e.stopPropagation()}>
        <div className="modal-handle" />
        <div className="modal-head">
          <button className="icon-btn" onClick={onBack}><Icon name="arrow-right" size={20} /></button>
          <h3>إتمام الطلب</h3>
          <button className="icon-btn" onClick={onClose}><Icon name="x" size={20} /></button>
        </div>
        <div className="mode-toggle">
          <button className={`mode-btn ${mode === "delivery" ? "mode-btn-active" : ""}`} onClick={() => setMode("delivery")}>
            <Icon name="bike" size={18} /><span>توصيل</span>
          </button>
          <button className={`mode-btn ${mode === "pickup" ? "mode-btn-active" : ""}`} onClick={() => setMode("pickup")}>
            <Icon name="store" size={18} /><span>استلام من المحل</span>
          </button>
        </div>
        <div className="form-stack">
          <label className="field"><span>الاسم الكامل</span><input value={name} onChange={(e) => setName(e.target.value)} placeholder="اكتب اسمك" /></label>
          <label className="field"><span>رقم الهاتف</span><input value={phoneNum} onChange={(e) => setPhoneNum(e.target.value)} placeholder="06XXXXXXXX" inputMode="tel" /></label>
          {mode === "delivery" && (
            <label className="field"><span>عنوان التوصيل</span><input value={address} onChange={(e) => setAddress(e.target.value)} placeholder="الحي، الشارع، رقم المنزل" /></label>
          )}
          <label className="field"><span>ملاحظات (اختياري)</span><input value={notes} onChange={(e) => setNotes(e.target.value)} placeholder="مثال: بدون بصل، زيادة فريت" /></label>
        </div>
        <div className="cart-summary">
          <div className="cart-total-row"><span>المجموع</span><span className="cart-total-value">{fmt(total)}</span></div>
          <button className="checkout-btn" disabled={!canSubmit} onClick={submit}><span>تأكيد وإرسال الطلب</span><Icon name="arrow-left" size={18} /></button>
        </div>
      </div>
    </div>
  );
}

  function addSimple(item) {
    const key = lineKey(item);
    setCart((prev) => {
      const existing = prev.find((l) => l.key === key);
      if (existing) return prev.map((l) => (l.key === key ? { ...l, qty: l.qty + 1 } : l));
      return [...prev, { key, name: item.name, size: null, unitPrice: item.price, qty: 1 }];
    });
  }

  function addSized(item, size, qty) {
    const key = lineKey(item, size);
    setCart((prev) => {
      const existing = prev.find((l) => l.key === key);
      if (existing) return prev.map((l) => (l.key === key ? { ...l, qty: l.qty + qty } : l));
      return [...prev, { key, name: item.name, size, unitPrice: item.sizes[size], qty }];
    });
  }

    setCart((prev) => prev.map((l) => (l.key === key ? { ...l, qty: l.qty + delta } : l)).filter((l) => l.qty > 0));

      <div className="menu-wrap">
        {filteredMenu.length === 0 && (
          <div className="empty-search"><Icon name="chef-hat" size={36} strokeWidth={1.2} /><p>لم نجد طبقاً يطابق بحثك</p></div>
        )}
        {filteredMenu.map((cat) => (
          <div key={cat.id} className="cat-section" ref={(el) => (sectionRefs.current[cat.id] = el)}>
            <div className="cat-section-head">
              <div className="cat-icon-badge"><Icon name={cat.icon} size={16} /></div>
              <h2>{cat.name}</h2>
            </div>
            {cat.note && <p className="cat-note">{cat.note}</p>}
            <div>
              {cat.items.map((item) => (
                <div className="item-card" key={item.name}>
                  <div className="item-info">
                    <span className="item-name">{item.name}</span>
                    {item.sizes ? (
                      <span className="item-price-range">من {fmt(Math.min(...Object.values(item.sizes)))}</span>
                    ) : (
                      <span className="item-price">{fmt(item.price)}</span>
                    )}
                  </div>
                  <button className="add-round" onClick={() => (item.sizes ? setSizeModalItem(item) : addSimple(item))}>
                    <Icon name="plus" size={16} />
                  </button>
                </div>
              ))}
            </div>
          </div>
        ))}
      </div>

      {cartCount > 0 && !cartOpen && !checkoutOpen && (
        <button className="cart-fab" onClick={() => setCartOpen(true)}>
          <div className="cart-fab-left">
            <span className="cart-fab-badge">{cartCount}</span>
            <span className="cart-fab-label">عرض السلة</span>
          </div>
          <span className="cart-fab-total">{fmt(total)}</span>
        </button>
      )}

      {sizeModalItem && <SizeModal item={sizeModalItem} onClose={() => setSizeModalItem(null)} onAdd={addSized} />}

      {cartOpen && !checkoutOpen && (
        <CartDrawer cart={cart} total={total} onClose={() => setCartOpen(false)} onQty={changeQty} onRemove={removeLine} onCheckout={() => setCheckoutOpen(true)} />
      )}

      {checkoutOpen && (
        <Checkout cart={cart} total={total} onBack={() => setCheckoutOpen(false)}
          onClose={() => { setCheckoutOpen(false); setCartOpen(false); setCart([]); }}
          onPlaceOrder={onOrderPlaced} />
      )}

      {ordersOpen && <OrdersModal orders={orders} onClose={() => setOrdersOpen(false)} />}
    </div>
  );
}

// ---------- واجهة الإدارة ولوحة التحكم المدمجة ----------
function DashboardView() {
  const [dashboardOrders, setDashboardOrders] = useState([]);

  useEffect(() => {
    const ordersRef = db.ref('orders');
    
    ordersRef.on('value', (snapshot) => {
      const data = snapshot.val();
      if (data) {
        const list = Object.keys(data).map(key => data[key])
          .sort((a, b) => b.timestamp - a.timestamp);
        setDashboardOrders(list);
      } else {
        setDashboardOrders([]);
      }
    });

    return () => ordersRef.off();
  }, []);

  function updateStatus(id, newStatus) {
    db.ref(`orders/${id}`).update({ status: newStatus });
  }

  function clearAllOrders() {
    if (confirm("هل أنت متأكد من مسح جميع الطلبات نهائياً من السيرفر؟")) {
      db.ref('orders').remove();
    }
  }

  return (
    <div className="dashboard-view">
      <style>{`
        .orders-container {
          background-color: var(--bg-card);
          border: 1px solid var(--border);
          border-radius: 16px;
          padding: 20px;
          max-width: 1000px;
          margin: 20px auto;
          box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .orders-container h3 {
          color: var(--text-main);
          margin-top: 0;
          margin-bottom: 20px;
          font-size: 1.3rem;
          border-bottom: 1px solid var(--border);
          padding-bottom: 12px;
          display: flex;
          justify-content: space-between;
          align-items: center;
        }
        .live-indicator {
          font-size: 12px;
          background: rgba(16, 185, 129, 0.15);
          color: #10b981;
          padding: 4px 10px;
          border-radius: 999px;
          font-weight: 600;
        }
        .dashboard-actions {
          display: flex;
          justify-content: flex-end;
          margin-bottom: 15px;
        }
        .btn-clear {
          background: none;
          border: 1px solid var(--out-of-stock);
          color: var(--out-of-stock);
          padding: 6px 12px;
          border-radius: 6px;
          cursor: pointer;
          font-size: 12px;
        }
        .btn-clear:hover {
          background: rgba(239, 68, 68, 0.1);
        }
        .table-responsive {
          width: 100%;
          overflow-x: auto;
        }
        table {
          width: 100%;
          border-collapse: collapse;
          text-align: right;
        }
        th, td {
          padding: 14px 15px;
          border-bottom: 1px solid var(--border);
          font-size: 0.95rem;
        }
        th {
          color: var(--text-muted);
          font-weight: 600;
        }
        .status-badge {
          display: inline-block;
          padding: 5px 10px;
          border-radius: 6px;
          font-size: 0.85rem;
          font-weight: bold;
        }
        .status-badge.preparing { background-color: var(--preparing); color: white; }
        .status-badge.delivered { background-color: var(--delivered); color: white; }
        .status-badge.out-of-stock { background-color: var(--out-of-stock); color: white; }
        .btn-group {
          display: flex;
          gap: 6px;
        }
        .btn {
          border: none;
          padding: 6px 12px;
          border-radius: 6px;
          cursor: pointer;
          font-family: inherit;
          font-size: 0.8rem;
          font-weight: 600;
          color: white;
          transition: all 0.2s;
        }
        .btn-deliver { background-color: var(--delivered); }
        .btn-deliver:hover { background-color: #059669; }
        .btn-out { background-color: var(--out-of-stock); }
        .btn-out:hover { background-color: #dc2626; }
        .empty-placeholder {
          text-align: center;
          padding: 40px 20px;
          color: var(--text-muted);
          font-style: italic;
        }
      `}</style>

      <div className="orders-container">
        <h3>
          <span>📥 طلبات المطبخ الحالية (شواية بن ديبان)</span>
          <span className="live-indicator">● السيرفر السحابي متصل ونشط 🌐</span>
        </h3>

        {dashboardOrders.length > 0 && (
          <div className="dashboard-actions">
            <button className="btn-clear" onClick={clearAllOrders}>تفريغ جدول السيرفر</button>
          </div>
        )}

        <div className="table-responsive">
          <table>
            <thead>
              <tr>
                <th>اسم الزبون / الهاتف</th>
                <th>الطلب ومكوناته</th>
                <th>طريقة الاستلام</th>
                <th>المجموع</th>
                <th>حالة الطلب الحالية</th>
                <th>إجراءات الإدارة البرمجية</th>
              </tr>
            </thead>
            <tbody>
              {dashboardOrders.map((order) => (
                <tr key={order.id}>
                  <td>
                    <strong>{order.name}</strong><br />
                    <span style={{ fontSize: '12px', color: 'var(--text-muted)' }}>{order.phone}</span>
                  </td>
                  <td>
                    {order.items && order.items.map((it, idx) => (
                      <div key={idx}>
                        {it.name} {it.size ? `(${it.size})` : ''} × {it.qty}
                      </div>
                    ))}
                    {order.notes && <div style={{ fontSize: '12px', color: 'var(--accent-color)', marginTop: '4px' }}>💡 {order.notes}</div>}
                  </td>
                  <td>{order.mode === 'delivery' ? `🛵 توصيل: ${order.address}` : '🏪 استلام من المحل'}</td>
                  <td style={{ color: 'var(--accent-color)', fontWeight: 'bold' }}>{order.total} درهم</td>
                  <td>
                    {order.status === 'preparing' && <span className="status-badge preparing">⏳ قيد التحضير</span>}
                    {order.status === 'delivered' && <span className="status-badge delivered">✅ تم التسليم</span>}
                    {order.status === 'out' && <span className="status-badge out-of-stock">✖ انتهى المخزون</span>}
                  </td>
                  <td>
                    <div className="btn-group">
                      <button className="btn btn-deliver" onClick={() => updateStatus(order.id, 'delivered')}>✔ تم التسليم</button>
                      <button className="btn btn-out" onClick={() => updateStatus(order.id, 'out')}>✖ انتهى المخزون</button>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>

        {dashboardOrders.length === 0 && (
          <div className="empty-placeholder">لا توجد طلبات نشطة حالياً على السيرفر. بانتظار طلبات الزبائن...</div>
        )}
      </div>
    </div>
  );
}

// ---------- التطبيق الرئيسي لدمج الواجهتين ----------
function App() {
  const [currentTab, setCurrentTab] = useState("customer"); 
  const [customerOrders, setCustomerOrders] = useState([]);

  useEffect(() => {
    const saved = localStorage.getItem("customer_orders");
    if (saved) setCustomerOrders(JSON.parse(saved));
  }, []);

  function handleNewOrderPlaced(order) {
    const updated = [order, ...customerOrders];
    setCustomerOrders(updated);
    localStorage.setItem("customer_orders", JSON.stringify(updated));
  }

  return (
    <div className="app-root">
      <div className="app-navigation">
        <button className={`nav-tab ${currentTab === "customer" ? "active" : ""}`} onClick={() => setCurrentTab("customer")}>
          🛒 تطبيق طلبات الزبائن
        </button>
        <button className={`nav-tab ${currentTab === "dashboard" ? "active" : ""}`} onClick={() => setCurrentTab("dashboard")}>
          📊 لوحة تحكم المطبخ والإدارة
        </button>
      </div>

      {currentTab === "customer" ? (
        <CustomerView onOrderPlaced={handleNewOrderPlaced} orders={customerOrders} />
      ) : (
        <DashboardView />
      )}
    </div>
  );
}

const root = document.getElementById("root");
ReactDOM.createRoot(root).render(<App />);
</script>
</body>
</html>
